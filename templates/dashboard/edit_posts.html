{% extends '../base/base.html' %}

{% block content %}
<div class="row">
    
    {% include 'dashboard/lefsidebar.html' %}

    {% load crispy_forms_tags %}

    <div class="col-md-9">
        <div class="card border-default mb-3">
            
            <div class="card-header text-center text-uppercase">
                <h3 class="text-dark">Edit Post</h3>
            </div>
            <form action="{% url 'edit_posts' post.pk %}" method="post" style="padding: 20px;" enctype="multipart/form-data">
                {% csrf_token %}
                {{form|crispy}}
                <button type="submit" class="btn btn-primary">Update</button>
            </form>

        </div>
    </div> 
</div>

{% endblock content %}
